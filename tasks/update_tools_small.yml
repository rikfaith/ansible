- name: Install general (non-X11) tools for Devuan
  apt:
    pkg:
      - sysv-rc-conf
  when: using_devuan is defined and using_devuan == True

- name: Install small (non-X11) tools for Devuan/Debian (AMD64 and ARM)
  apt:
    pkg:
      - 7zip
      - acl
      - bc
      - bind9-utils
      - curl
      - dc
      - ddate
      - dmidecode
      - enscript
      - ethtool
      - gawk
      - git
      - git-lfs
      - gnuplot
      - htop
      - imagemagick
      - iperf3
      - ipmitool
      - iputils-tracepath
      - jc
      - jq
      - lm-sensors
      - lshw
      - lsof
      - lsscsi
      - ltrace
      - m4
      - mbw
      - ncal
      - net-tools
      - nmap
      - nvme-cli
      - oathtool
      - openssh-client
      - p7zip-full
      - parted
      - pipx
      - prometheus-node-exporter
      - psutils
      - python-is-python3
      - ripgrep
      - rsync
      - smartmontools
      - snmp
      - sshpass
      - strace
      - sysstat
      - telnet
      - tmux
      - traceroute
      - units
      - unrar
      - unzip
      - usbutils
      - vim
      - whois
      - wtmpdb
      - xz-utils
      - zarchive-tools
      - zip
      - zsh

- name: Install small (non-X11) tools for Devuan/Debian (amd64 only)
  when: target_is_arm is not defined or target_is_arm == False
  apt:
    pkg:
      - cpuid
      - intel-microcode
      - pcm